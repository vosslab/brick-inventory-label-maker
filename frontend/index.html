<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Brick inventory label maker</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>Brick inventory label maker</h1>
		<div id="health-banner"></div>
	</header>

	<main>
		<div class="layout">
			<section class="panel left-panel">
				<div class="section">
					<h2>Mode</h2>
					<div class="radio-group">
						<label>
							<input type="radio" name="mode" value="minifig" checked>
							Minifigures
						</label>
						<label>
							<input type="radio" name="mode" value="set">
							Sets
						</label>
					</div>
				</div>

				<div class="section">
					<h2>Options</h2>
					<div class="checkbox-group">
						<label>
							<input type="checkbox" id="debug-flag">
							Debug mode
						</label>
						<label>
							<input type="checkbox" id="calibration-flag">
							Calibration
						</label>
					</div>
				</div>

				<div class="section">
					<h2>IDs</h2>
					<textarea id="id-input" placeholder="Enter IDs (one per line or comma-separated)"></textarea>
				</div>

				<div class="section">
					<button id="generate-btn">Generate labels</button>
				</div>
			</section>

			<section class="panel right-panel">
				<div class="subsection">
					<h2>Progress</h2>
					<div id="progress-log" class="log"></div>
				</div>

				<div class="subsection">
					<h2>Warnings</h2>
					<div id="warnings-panel" class="warnings"></div>
				</div>
			</section>
		</div>
	</main>

	<script type="module" src="app.js"></script>
</body>
</html>
