services:
  labels:
    build: .
    image: brick-inventory-label-maker:latest
    container_name: brick-labels
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BRICKLINK_API_FILE: /etc/brick-labels/bricklink_api_private.yml
      BRICK_CACHE_DIR: /app/cache
      DARK_IMAGE_ACTION: warn
      DARK_IMAGE_LSTAR_THRESHOLD: "35"
      LABELS_OFFLINE: "0"
    volumes:
      # Read-only credentials file. User copies bricklink_api_private.example.yml -> bricklink_api_private.yml
      # OR symlinks to ~/Documents/BrickLink/API_KEYS/bricklink_api_private.yml.
      - ./bricklink_api_private.yml:/etc/brick-labels/bricklink_api_private.yml:ro
      # Writable cache dir. Default repo-local; developer can point at external/brick-collection/CACHE to share.
      - ./cache:/app/cache:Z
    restart: unless-stopped
